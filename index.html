<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="title-bar">
      <div class="brand-wrap">
        <img src="nasa-logo.svg" alt="NASA logo" class="nasa-logo" />
        <h1>Space Explorer</h1>
      </div>
    </header>

    <main class="page-shell">
      <section class="controls" aria-label="Search controls">
        <form id="search-form" class="search-form">
          <div class="field">
            <label for="start-date">Start date</label>
            <input id="start-date" name="start-date" type="date" required />
          </div>

          <div class="field">
            <label for="end-date">End date</label>
            <input id="end-date" name="end-date" type="date" required />
          </div>

          <button type="submit" id="search-btn">Search Images</button>
        </form>
        <p class="helper-text">
          Enter a start date and an end date, and click Search Images for
         Daily Astronomy images within that time range.
        </p>
      </section>

      <section class="status" id="status" aria-live="polite"></section>

      <section class="gallery" id="gallery" aria-label="NASA image gallery"></section>
    </main>

    <div class="image-modal" id="image-modal" aria-hidden="true">
      <div class="image-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button type="button" class="image-modal__close" id="modal-close" aria-label="Close image details">
          <i class="bi bi-x-lg" aria-hidden="true"></i>
        </button>
        <img id="modal-image" class="image-modal__image" src="" alt="" />
        <div class="image-modal__content">
          <h2 id="modal-title"></h2>
          <p id="modal-date" class="image-modal__date"></p>
          <p id="modal-explanation" class="image-modal__explanation"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
